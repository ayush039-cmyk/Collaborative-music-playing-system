apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-deployment
  labels:
    type: frontend
    namespace: dna-music
spec:
  replicas: 2
  selector:
    matchLabels:
      type: frontend
  template:
    metadata:
      name: front-pod
      labels:
        type: frontend
    spec:
      containers:
        - name: frontend
          image: dockerayush039/sepmfront
          imagePullPolicy: Always
  
